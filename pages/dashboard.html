<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Dinesh Hotel</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="toast-container"></div>
<div id="print-receipt"></div>

<div class="admin-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="hamburger-btn" id="hamburger-btn">☰</button>
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-subtitle" id="today-date">
            Today's Overview
          </div>
        </div>
      </div>
      <div class="top-bar-right">
        <span class="current-time" id="current-time"></span>
        <a href="/pages/billing.html"
           class="btn btn-primary btn-sm">+ New Bill</a>
      </div>
    </div>

    <div class="page-content">

      <!-- Stats -->
      <div class="stats-grid mb-4">
        <div class="stat-card orange">
          <div class="stat-icon orange">💰</div>
          <div class="stat-value" id="today-sales">₹0</div>
          <div class="stat-label">Today's Sales</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon blue">🧾</div>
          <div class="stat-value" id="today-bills">0</div>
          <div class="stat-label">Bills Today</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-icon purple">📅</div>
          <div class="stat-value" id="month-sales">₹0</div>
          <div class="stat-label">Month Sales</div>
        </div>
      </div>

      <div class="grid-2 mb-4">
        <!-- Quick Actions -->
        <div class="card">
          <div class="card-header">
            <h3>⚡ Quick Actions</h3>
          </div>
          <div class="card-body"
               style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <a href="/pages/billing.html"
               class="btn btn-primary">🧾 New Bill</a>
            <a href="/pages/history.html"
               class="btn btn-secondary">📋 View Bills</a>
            <a href="/pages/menu.html"
               class="btn btn-secondary">🍛 Menu Items</a>
            <a href="/pages/reports.html"
               class="btn btn-secondary">📈 Reports</a>
          </div>
        </div>

        <!-- Month Summary -->
        <div class="card">
          <div class="card-header">
            <h3>📅 This Month</h3>
          </div>
          <div class="card-body">
            <div class="total-row">
              <span>Total Sales</span>
              <span class="mono font-bold" id="m-sales">₹0.00</span>
            </div>
            <div class="total-row">
              <span>Total Bills</span>
              <span class="mono font-bold" id="m-bills">0</span>
            </div>
            <div class="total-row">
              <span>Avg Bill Value</span>
              <span class="mono font-bold" id="m-avg">₹0.00</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Recent Bills -->
      <div class="card">
        <div class="card-header">
          <h3>🕐 Recent Bills</h3>
          <a href="/pages/history.html"
             class="btn btn-sm btn-ghost">View All →</a>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Bill No</th>
                <th>Date</th>
                <th>Time</th>
                <th>Items</th>
                <th class="text-right">Total</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="recent-bills-body">
              <tr>
                <td colspan="6">
                  <div class="loading-spinner"></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ✅ FIXED: Added ../ to all script paths (file is inside pages/ folder) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
(async () => {
  const user = await Auth.requireAuth();
  if (!user) return;

  injectSidebar('dashboard');

  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('en-IN', {
      weekday: 'long',
      day: 'numeric',
      month: 'long',
      year: 'numeric'
    });

  await loadStats();
  await loadRecentBills();
})();

async function loadStats() {
  try {
    const today = new Date().toISOString().slice(0, 10);
    const m = new Date();
    const monthStart = `${m.getFullYear()}-${String(
      m.getMonth()+1).padStart(2,'0')}-01`;

    const todayBills = await Bills.getByDateRange(today, today);
    const monthBills = await Bills.getByDateRange(monthStart, today);

    const todaySales = todayBills.reduce(
      (s,b) => s + Number(b.total), 0);
    const monthSales = monthBills.reduce(
      (s,b) => s + Number(b.total), 0);

    document.getElementById('today-sales').textContent =
      formatCurrency(todaySales);
    document.getElementById('today-bills').textContent =
      todayBills.length;
    document.getElementById('month-sales').textContent =
      formatCurrency(monthSales);
    document.getElementById('m-sales').textContent =
      formatCurrency(monthSales);
    document.getElementById('m-bills').textContent =
      monthBills.length;
    document.getElementById('m-avg').textContent =
      monthBills.length > 0
        ? formatCurrency(monthSales / monthBills.length)
        : '₹0.00';

  } catch(e) {
    console.error('Stats error:', e);
  }
}

async function loadRecentBills() {
  const tbody = document.getElementById('recent-bills-body');
  try {
    const bills = await Bills.getAll();
    const recent = bills.slice(0, 10);

    if (recent.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6">
        <div class="empty-state">
          <div class="empty-icon">🧾</div>
          <p>No bills yet.
            <a href="/pages/billing.html"
               style="color:var(--saffron)">
              Create your first bill
            </a>
          </p>
        </div></td></tr>`;
      return;
    }

    tbody.innerHTML = recent.map(bill => `
      <tr>
        <td>
          <span class="mono font-bold"
                style="color:var(--saffron)">
            ${bill.bill_number}
          </span>
        </td>
        <td>${formatDate(bill.bill_date)}</td>
        <td class="mono">
          ${bill.bill_time ? bill.bill_time.slice(0,5) : '-'}
        </td>
        <td>
          ${bill.bill_items ? bill.bill_items.length : 0} items
        </td>
        <td class="text-right mono font-bold">
          ${formatCurrency(bill.total)}
        </td>
        <td>
          <a href="/pages/history.html"
             class="btn btn-sm btn-ghost">View</a>
        </td>
      </tr>
    `).join('');

  } catch(e) {
    console.error('Bills error:', e);
    tbody.innerHTML = `<tr><td colspan="6"
      style="text-align:center;color:var(--danger);">
      Error: ${e.message}
    </td></tr>`;
  }
}
</script>
</body>
</html>
