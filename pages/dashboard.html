<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test — Dinesh Hotel</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .box { background: white; padding: 20px; border-radius: 10px; 
           margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .success { color: green; font-weight: bold; }
    .error { color: red; font-weight: bold; }
    .loading { color: orange; }
    h2 { margin: 0 0 10px; }
    pre { background: #f0f0f0; padding: 10px; border-radius: 5px; 
          font-size: 12px; overflow-x: auto; }
    button { background: #E8670A; color: white; border: none; 
             padding: 10px 20px; border-radius: 8px; 
             font-size: 1rem; cursor: pointer; margin: 5px; }
  </style>
</head>
<body>

<h1>🔍 Supabase Connection Test</h1>

<div class="box">
  <h2>1. Supabase Library</h2>
  <div id="lib-status" class="loading">Checking...</div>
</div>

<div class="box">
  <h2>2. Database Connection</h2>
  <div id="db-status" class="loading">Checking...</div>
</div>

<div class="box">
  <h2>3. Menu Items</h2>
  <div id="menu-status" class="loading">Checking...</div>
  <pre id="menu-data"></pre>
</div>

<div class="box">
  <h2>4. Bills</h2>
  <div id="bills-status" class="loading">Checking...</div>
  <pre id="bills-data"></pre>
</div>

<div class="box">
  <h2>5. Auth Session</h2>
  <div id="auth-status" class="loading">Checking...</div>
</div>

<div class="box">
  <button onclick="runAllTests()">🔄 Run Tests Again</button>
  <button onclick="window.location.href='/pages/billing.html'">
    Go to Billing
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
const SUPABASE_URL = 'https://gtujlykdrfwqbdschsya.supabase.co';
const SUPABASE_ANON_KEY = 'PASTE_YOUR_ANON_KEY_HERE';

async function runAllTests() {
  // Test 1 - Library
  const libEl = document.getElementById('lib-status');
  if (window.supabase && window.supabase.createClient) {
    libEl.className = 'success';
    libEl.textContent = '✅ Supabase library loaded correctly!';
  } else {
    libEl.className = 'error';
    libEl.textContent = '❌ Supabase library NOT loaded!';
    return;
  }

  // Test 2 - Connection
  const dbEl = document.getElementById('db-status');
  let client;
  try {
    client = window.supabase.createClient(
      SUPABASE_URL, SUPABASE_ANON_KEY
    );
    dbEl.className = 'success';
    dbEl.textContent = '✅ Connected to Supabase: ' + SUPABASE_URL;
  } catch(e) {
    dbEl.className = 'error';
    dbEl.textContent = '❌ Connection failed: ' + e.message;
    return;
  }

  // Test 3 - Menu Items
  const menuEl = document.getElementById('menu-status');
  const menuData = document.getElementById('menu-data');
  try {
    const { data, error } = await client
      .from('menu_items')
      .select('*');
    if (error) {
      menuEl.className = 'error';
      menuEl.textContent = '❌ Menu Error: ' + error.message;
      menuData.textContent = JSON.stringify(error, null, 2);
    } else {
      menuEl.className = 'success';
      menuEl.textContent = '✅ Menu items found: ' + data.length;
      menuData.textContent = JSON.stringify(
        data.slice(0,3), null, 2
      );
    }
  } catch(e) {
    menuEl.className = 'error';
    menuEl.textContent = '❌ Exception: ' + e.message;
  }

  // Test 4 - Bills
  const billsEl = document.getElementById('bills-status');
  const billsData = document.getElementById('bills-data');
  try {
    const { data, error } = await client
      .from('bills')
      .select('*');
    if (error) {
      billsEl.className = 'error';
      billsEl.textContent = '❌ Bills Error: ' + error.message;
      billsData.textContent = JSON.stringify(error, null, 2);
    } else {
      billsEl.className = 'success';
      billsEl.textContent = '✅ Bills found: ' + data.length;
      billsData.textContent = JSON.stringify(
        data.slice(0,2), null, 2
      );
    }
  } catch(e) {
    billsEl.className = 'error';
    billsEl.textContent = '❌ Exception: ' + e.message;
  }

  // Test 5 - Auth
  const authEl = document.getElementById('auth-status');
  try {
    const { data: { session } } = await client.auth.getSession();
    if (session) {
      authEl.className = 'success';
      authEl.textContent = '✅ Logged in as: ' + session.user.email;
    } else {
      authEl.className = 'error';
      authEl.textContent = '❌ Not logged in! Session expired.';
    }
  } catch(e) {
    authEl.className = 'error';
    authEl.textContent = '❌ Auth error: ' + e.message;
  }
}

// Run on load
window.addEventListener('load', runAllTests);
</script>

</body>
</html>
