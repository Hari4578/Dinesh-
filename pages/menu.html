<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Management — Dinesh Hotel</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="admin-layout">
  <div id="sidebar-container"></div>

  <div class="main-content">
    <h2>Menu Items</h2>

    <input type="text" id="menu-search" placeholder="Search items..." />

    <table border="1" width="100%" style="margin-top:10px;">
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="menu-table-body">
        <tr><td colspan="4">Loading...</td></tr>
      </tbody>
    </table>

  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/sidebar.js"></script>

<script>
let allItems = [];

(async () => {
  // 🔥 AUTH REMOVED (so it won't block)
  console.log("Loading menu...");
  injectSidebar('menu');
  await loadItems();
})();

async function loadItems() {
  const tbody = document.getElementById('menu-table-body');

  try {
    const { data, error } = await db
      .from('menu_items')
      .select('*');

    if (error) throw error;

    console.log("DATA:", data);

    allItems = data || [];
    renderTable();

  } catch (e) {
    console.error(e);
    tbody.innerHTML = `<tr><td colspan="4">Error: ${e.message}</td></tr>`;
  }
}

function renderTable() {
  const tbody = document.getElementById('menu-table-body');
  const search = document.getElementById('menu-search').value.toLowerCase();

  let items = allItems.filter(item => {
    return (item.name || '').toLowerCase().includes(search);
  });

  if (items.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4">No items found</td></tr>`;
    return;
  }

  tbody.innerHTML = items.map(item => `
    <tr>
      <td>${item.name || 'No Name'}</td>
      <td>${item.category || ''}</td>
      <td>₹${Number(item.selling_price || 0).toFixed(2)}</td>
      <td>${item.available ? '✅ Available' : '🚫 Off'}</td>
    </tr>
  `).join('');
}

document.getElementById('menu-search')
  .addEventListener('input', renderTable);

</script>

</body>
</html>
